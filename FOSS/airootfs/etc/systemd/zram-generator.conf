# zram-generator configuration for XeroLinux
# Optimized compressed RAM swap for most systems

[zram0]
# Size: half of RAM, capped at 8GB
zram-size = min(ram / 2, 8192)

# Compression: zstd offers best ratio with good speed
compression-algorithm = zstd

# Priority: highest, always prefer zram over disk swap
swap-priority = 32767

# Filesystem type
fs-type = swap
