LABEL arch nvidia
TEXT HELP
Boot the XeroLinux Demo medium on BIOS with Open Source Drivers.
It allows you to try XeroLinux or perform system maintenance.
ENDTEXT
MENU LABEL Start The XeroLinux Demo
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=100MB copytoram=n driver=nvidia module_blacklist=nouveau nouveau.modeset=0 nvidia_drm.modeset=1 radeon.modeset=1 i915.modeset=1 nvme_load=yes module_blacklist=pcspkr
