LABEL arch free
TEXT HELP
Boot the XeroLinux Demo medium on BIOS with Open Source Drivers.
It allows you to test XeroLinux or perform system maintenance.
ENDTEXT
MENU LABEL Start The XeroLinux Installer
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=100M copytoram=n driver=free module_blacklist=nouveau nouveau.modeset=0 radeon.modeset=1 i915.modeset=1 module_blacklist=pcspkr nvme_load=yes
