LABEL arch nvidia
TEXT HELP
Boot the XeroLinux install medium on BIOS with nVidia Open (RTX).
It allows you to install XeroLinux or perform system maintenance.
ENDTEXT
MENU LABEL Start The XeroLinux Installer
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n driver=nvidia module_blacklist=nouveau nouveau.modeset=0 nvidia_drm.modeset=1 radeon.modeset=1 i915.modeset=1 nvme_load=yes module_blacklist=pcspkr

LABEL arch nomodeset
TEXT HELP
Boot the XeroLinux install medium on BIOS with Safe Graphics.
It allows you to install XeroLinux or perform system maintenance.
ENDTEXT
MENU LABEL Start The XeroLinux Installer in Safe Mode
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n driver=free nomodeset module_blacklist=nouveau nouveau.modeset=0 amdgpu.modeset=0 radeon.modeset=0 i915.modeset=0 nvme_load=yes
