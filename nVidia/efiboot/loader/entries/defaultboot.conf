title   Start The XeroLinux Installer (nVidia RTX Only)
sort-key 01
linux    /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
initrd   /%INSTALL_DIR%/boot/intel-ucode.img
initrd   /%INSTALL_DIR%/boot/amd-ucode.img
initrd   /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
options archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n driver=nvidia module_blacklist=nouveau nouveau.modeset=1 radeon.modeset=1 i915.modeset=1 module_blacklist=pcspkr nvme_load=yes
